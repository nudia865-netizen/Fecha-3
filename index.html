<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prode – Fecha 3 Mundial 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:      #5fd436;
    --green-dim:  rgba(95,212,54,.13);
    --green-hover:#4bbf27;
    --dark:       #0d1208;
    --card:       #131a0e;
    --card2:      #1a2412;
    --border:     #2a3820;
    --text:       #e8f0e0;
    --muted:      #8ba07a;
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }
  .wrapper { max-width: 580px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 28px; }
  .header .badge {
    display: inline-block;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 20px;
    font-size: 11px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 4px 12px; margin-bottom: 10px;
  }
  .header h1 { font-size: 26px; font-weight: 700; }
  .header h1 span { color: var(--green); }
  .header p { margin-top: 6px; color: var(--muted); font-size: 13px; }

  .name-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .name-row label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
  .name-row input {
    flex: 1; background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-size: 15px; font-weight: 500;
    padding: 8px 12px; outline: none; transition: border-color .15s;
  }
  .name-row input:focus { border-color: var(--green); }

  #prodeCard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .card-header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .day-label {
    font-size: 10px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em;
    margin: 14px 0 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .day-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .match {
    display: grid;
    grid-template-columns: 42px 1fr 88px 1fr;
    align-items: center;
    gap: 6px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .match:last-child { border-bottom: none; }

  /* Columna izquierda: hora + grupo */
  .match-meta {
    display: flex; flex-direction: column; align-items: flex-start; gap: 3px;
  }
  .match-time { font-size: 10px; color: var(--muted); font-family: monospace; line-height: 1; }
  .group-tag {
    font-size: 9px; font-weight: 700;
    color: var(--green); background: var(--green-dim);
    border-radius: 4px; padding: 1px 4px; text-transform: uppercase;
    line-height: 1.4;
  }

  .team { display: flex; flex-direction: column; }
  .team.home { align-items: flex-end; text-align: right; }
  .team.away { align-items: flex-start; }
  .team-name { font-size: 15px; font-weight: 700; }
  .flag { font-style: normal; }

  .score-block { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .score-inputs { display: flex; align-items: center; gap: 4px; }
  .score-inputs input {
    width: 34px; height: 34px;
    background: var(--card2); border: 1.5px solid var(--border);
    border-radius: 7px; color: var(--text);
    font-family: monospace; font-size: 16px; font-weight: 700;
    text-align: center; outline: none;
    transition: border-color .15s, background .15s;
    -moz-appearance: textfield;
  }
  .score-inputs input::-webkit-outer-spin-button,
  .score-inputs input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-inputs input:focus { border-color: var(--green); background: var(--green-dim); }
  .score-sep { font-size: 16px; font-weight: 700; color: var(--muted); }

  .actions { display: flex; gap: 10px; margin-top: 16px; }
  button {
    flex: 1; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    padding: 13px 20px; cursor: pointer;
    transition: opacity .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  button:active { transform: scale(.98); }
  button.primary { background: var(--green); color: #071200; }
  button.primary:hover { opacity: .9; }
  button.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  button.secondary:hover { border-color: var(--green); color: var(--green); }
  button:disabled { opacity: .5; cursor: not-allowed; }

  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    font-weight: 700; font-size: 13px;
    padding: 10px 20px; border-radius: 24px;
    transition: transform .3s ease;
    pointer-events: none; white-space: nowrap; z-index: 9999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 420px) {
    .team-name { font-size: 13px; }
    .score-inputs input { width: 30px; height: 30px; font-size: 14px; }
    #prodeCard { padding: 12px; }
    .actions { flex-direction: column; }
    .match { grid-template-columns: 38px 1fr 80px 1fr; gap: 4px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="badge">⚽ Mundial 2026</div>
    <h1>Prode <span>Fecha 3</span></h1>
    <p>Completá tu nombre, ingresá los resultados y guardá la imagen</p>
  </div>

  <div class="name-row">
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" placeholder="¿Cómo te llamás?" autocomplete="off"/>
  </div>

  <div id="prodeCard">
    <div class="card-header">
      <div class="card-title">⚽ Prode · Fecha 3 · Mundial 2026</div>
      <div class="card-sub" id="cardSub">Completá tu nombre arriba</div>
    </div>
    <div id="matchesContainer"></div>
  </div>

  <div class="actions">
    <button class="secondary" id="limpiar">🗑 Limpiar</button>
    <button class="primary" id="captura">📥 Guardar imagen</button>
  </div>
</div>

<div id="toast"></div>

<script>
const FLAGS = {
  'Suiza': '🇨🇭', 'Canadá': '🇨🇦', 'Bosnia y Herz.': '🇧🇦', 'Qatar': '🇶🇦',
  'Escocia': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Brasil': '🇧🇷', 'Marruecos': '🇲🇦', 'Haití': '🇭🇹',
  'Rep. Checa': '🇨🇿', 'México': '🇲🇽', 'Sudáfrica': '🇿🇦', 'Corea del Sur': '🇰🇷',
  'Ecuador': '🇪🇨', 'Alemania': '🇩🇪', 'Curazao': '🇨🇼', 'Costa de Marfil': '🇨🇮',
  'Japón': '🇯🇵', 'Suecia': '🇸🇪', 'Túnez': '🇹🇳', 'Países Bajos': '🇳🇱',
  'Turquía': '🇹🇷', 'Estados Unidos': '🇺🇸', 'Paraguay': '🇵🇾', 'Australia': '🇦🇺',
  'Noruega': '🇳🇴', 'Francia': '🇫🇷', 'Senegal': '🇸🇳', 'Irak': '🇮🇶',
  'Cabo Verde': '🇨🇻', 'Arabia Saudita': '🇸🇦', 'Uruguay': '🇺🇾', 'España': '🇪🇸',
  'Egipto': '🇪🇬', 'Irán': '🇮🇷', 'Nueva Zelanda': '🇳🇿', 'Bélgica': '🇧🇪',
  'Panamá': '🇵🇦', 'Inglaterra': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Croacia': '🇭🇷', 'Ghana': '🇬🇭',
  'Colombia': '🇨🇴', 'Portugal': '🇵🇹', 'R. D. Congo': '🇨🇩', 'Uzbekistán': '🇺🇿',
  'Argelia': '🇩🇿', 'Austria': '🇦🇹', 'Jordania': '🇯🇴', 'Argentina': '🇦🇷',
};

const PARTIDOS = [
  { fecha: '2026-06-24', hora: '16:00', grupo: 'B', local: 'Suiza',            visitante: 'Canadá'          },
  { fecha: '2026-06-24', hora: '16:00', grupo: 'B', local: 'Bosnia y Herz.',   visitante: 'Qatar'           },
  { fecha: '2026-06-24', hora: '19:00', grupo: 'C', local: 'Escocia',          visitante: 'Brasil'          },
  { fecha: '2026-06-24', hora: '19:00', grupo: 'C', local: 'Marruecos',        visitante: 'Haití'           },
  { fecha: '2026-06-24', hora: '22:00', grupo: 'A', local: 'Rep. Checa',       visitante: 'México'          },
  { fecha: '2026-06-24', hora: '22:00', grupo: 'A', local: 'Sudáfrica',        visitante: 'Corea del Sur'   },
  { fecha: '2026-06-25', hora: '17:00', grupo: 'E', local: 'Ecuador',          visitante: 'Alemania'        },
  { fecha: '2026-06-25', hora: '17:00', grupo: 'E', local: 'Curazao',          visitante: 'Costa de Marfil' },
  { fecha: '2026-06-25', hora: '20:00', grupo: 'F', local: 'Japón',            visitante: 'Suecia'          },
  { fecha: '2026-06-25', hora: '20:00', grupo: 'F', local: 'Túnez',            visitante: 'Países Bajos'    },
  { fecha: '2026-06-25', hora: '23:00', grupo: 'D', local: 'Turquía',          visitante: 'Estados Unidos'  },
  { fecha: '2026-06-25', hora: '23:00', grupo: 'D', local: 'Paraguay',         visitante: 'Australia'       },
  { fecha: '2026-06-26', hora: '16:00', grupo: 'I', local: 'Noruega',          visitante: 'Francia'         },
  { fecha: '2026-06-26', hora: '16:00', grupo: 'I', local: 'Senegal',          visitante: 'Irak'            },
  { fecha: '2026-06-26', hora: '21:00', grupo: 'H', local: 'Cabo Verde',       visitante: 'Arabia Saudita'  },
  { fecha: '2026-06-26', hora: '21:00', grupo: 'H', local: 'Uruguay',          visitante: 'España'          },
  { fecha: '2026-06-27', hora: '00:00', grupo: 'G', local: 'Egipto',           visitante: 'Irán'            },
  { fecha: '2026-06-27', hora: '00:00', grupo: 'G', local: 'Nueva Zelanda',    visitante: 'Bélgica'         },
  { fecha: '2026-06-27', hora: '18:00', grupo: 'L', local: 'Panamá',           visitante: 'Inglaterra'      },
  { fecha: '2026-06-27', hora: '18:00', grupo: 'L', local: 'Croacia',          visitante: 'Ghana'           },
  { fecha: '2026-06-27', hora: '20:30', grupo: 'K', local: 'Colombia',         visitante: 'Portugal'        },
  { fecha: '2026-06-27', hora: '20:30', grupo: 'K', local: 'R. D. Congo',      visitante: 'Uzbekistán'      },
  { fecha: '2026-06-27', hora: '23:00', grupo: 'J', local: 'Argelia',          visitante: 'Austria'         },
  { fecha: '2026-06-27', hora: '23:00', grupo: 'J', local: 'Jordania',         visitante: 'Argentina'       },
];

const DIAS = {
  '2026-06-24': 'Miércoles 24/6',
  '2026-06-25': 'Jueves 25/6',
  '2026-06-26': 'Viernes 26/6',
  '2026-06-27': 'Sábado 27/6',
};

/* ── Build DOM ── */
const container = document.getElementById('matchesContainer');
let lastFecha = null;
PARTIDOS.forEach((p, i) => {
  if (p.fecha !== lastFecha) {
    const lbl = document.createElement('div');
    lbl.className = 'day-label';
    lbl.textContent = DIAS[p.fecha] || p.fecha;
    container.appendChild(lbl);
    lastFecha = p.fecha;
  }
  const row = document.createElement('div');
  row.className = 'match';
  row.dataset.idx = i;
  row.innerHTML = `
    <div class="match-meta">
      <span class="match-time">${p.hora}</span>
      <span class="group-tag">G. ${p.grupo}</span>
    </div>
    <div class="team home">
      <span class="team-name"><span class="flag">${FLAGS[p.local]||''}</span> ${p.local}</span>
    </div>
    <div class="score-block">
      <div class="score-inputs">
        <input type="number" min="0" max="99" class="gl" inputmode="numeric" placeholder="–"/>
        <span class="score-sep">:</span>
        <input type="number" min="0" max="99" class="gv" inputmode="numeric" placeholder="–"/>
      </div>
    </div>
    <div class="team away">
      <span class="team-name">${p.visitante} <span class="flag">${FLAGS[p.visitante]||''}</span></span>
    </div>`;
  container.appendChild(row);
});

/* ── Nombre ── */
document.getElementById('nombre').addEventListener('input', function () {
  const n = this.value.trim();
  document.getElementById('cardSub').textContent = n ? 'Predicciones de ' + n : 'Completá tu nombre arriba';
});

/* ── Limpiar ── */
document.getElementById('limpiar').onclick = () => {
  if (!confirm('¿Limpiar todos los resultados?')) return;
  container.querySelectorAll('input').forEach(i => i.value = '');
  showToast('✓ Limpiado');
};

/* ── Toast ── */
function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#5fd436' : '#e74c3c';
  t.style.color = ok ? '#071200' : '#fff';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── Canvas export ── */
document.getElementById('captura').onclick = generarImagen;

function generarImagen() {
  const btn = document.getElementById('captura');
  btn.disabled = true;
  btn.textContent = '⏳ Generando…';

  try {
    const scores = [];
    container.querySelectorAll('.match').forEach(row => {
      const gl = row.querySelector('.gl').value;
      const gv = row.querySelector('.gv').value;
      scores.push({ gl: gl === '' ? '–' : gl, gv: gv === '' ? '–' : gv });
    });

    const nombre = document.getElementById('nombre').value.trim();

    const S   = 2;
    const W   = 520;
    const PAD = 24;
    const INNER = W - PAD * 2;

    const C = {
      bg:     '#131a0e',
      card2:  '#1a2412',
      border: '#2a3820',
      text:   '#e8f0e0',
      muted:  '#8ba07a',
      green:  '#5fd436',
      greenD: 'rgba(95,212,54,0.15)',
      sep:    'rgba(255,255,255,0.04)',
    };

    const fb = sz => `bold ${sz * S}px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif`;
    const fn = (sz, w = 400) => `${w} ${sz * S}px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif`;
    const fm = sz => `bold ${sz * S}px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace`;

    const HEADER_H    = 60;
    const FOOTER_H    = 36;
    const DAY_LBL_H   = 26;
    const MATCH_H     = 46;
    const SECTION_GAP = 14;
    const META_W      = 44;

    const groups = [];
    let cur = null;
    PARTIDOS.forEach((p, i) => {
      if (!cur || cur.fecha !== p.fecha) {
        cur = { fecha: p.fecha, label: DIAS[p.fecha] || p.fecha, items: [] };
        groups.push(cur);
      }
      cur.items.push({ ...p, score: scores[i] });
    });

    let contentH = HEADER_H + 16;
    groups.forEach(g => { contentH += DAY_LBL_H + g.items.length * MATCH_H + SECTION_GAP; });
    contentH += FOOTER_H + 16;

    const canvas = document.createElement('canvas');
    canvas.width  = W * S;
    canvas.height = (PAD * 2 + contentH) * S;
    const ctx = canvas.getContext('2d');

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo((x+r)*S, y*S); ctx.lineTo((x+w-r)*S, y*S);
      ctx.arcTo((x+w)*S, y*S, (x+w)*S, (y+r)*S, r*S);
      ctx.lineTo((x+w)*S, (y+h-r)*S);
      ctx.arcTo((x+w)*S, (y+h)*S, (x+w-r)*S, (y+h)*S, r*S);
      ctx.lineTo((x+r)*S, (y+h)*S);
      ctx.arcTo(x*S, (y+h)*S, x*S, (y+h-r)*S, r*S);
      ctx.lineTo(x*S, (y+r)*S);
      ctx.arcTo(x*S, y*S, (x+r)*S, y*S, r*S);
      ctx.closePath();
    }
    function line(x1, y1, x2, y2, color, width = 1) {
      ctx.beginPath(); ctx.moveTo(x1*S, y1*S); ctx.lineTo(x2*S, y2*S);
      ctx.strokeStyle = color; ctx.lineWidth = width*S; ctx.stroke();
    }
    function txt(str, x, y, font, color, align = 'left', maxW) {
      ctx.font = font; ctx.fillStyle = color; ctx.textAlign = align; ctx.textBaseline = 'middle';
      if (maxW) ctx.fillText(str, x*S, y*S, maxW*S);
      else      ctx.fillText(str, x*S, y*S);
    }
    function badgeFn(str, cx, cy, color, bgColor) {
      ctx.font = fm(9);
      const tw = ctx.measureText(str).width / S;
      const bw = tw+10, bh = 16, bx = cx-bw/2, by = cy-bh/2;
      roundRect(bx, by, bw, bh, 4); ctx.fillStyle = bgColor; ctx.fill();
      txt(str, cx, cy, fm(9), color, 'center');
    }
    function scoreBox(val, cx, cy) {
      const bw = 38, bh = 36;
      roundRect(cx-bw/2, cy-bh/2, bw, bh, 7);
      ctx.fillStyle = val === '–' ? C.card2 : C.greenD; ctx.fill();
      roundRect(cx-bw/2, cy-bh/2, bw, bh, 7);
      ctx.strokeStyle = val === '–' ? C.border : C.green; ctx.lineWidth = 1.5*S; ctx.stroke();
      txt(val, cx, cy, fm(17), val === '–' ? C.muted : C.text, 'center');
    }

    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let y = PAD;

    txt('⚽  Prode · Fecha 3 · Mundial 2026', PAD, y+16, fb(14), C.text);
    txt(nombre ? 'Predicciones de ' + nombre : 'Mundial 2026', PAD, y+36, fn(12), C.muted);
    y += HEADER_H;

    line(PAD, y, W-PAD, y, C.border);
    y += 16;

    groups.forEach(g => {
      ctx.font = fn(10, 700); ctx.fillStyle = C.muted;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(g.label.toUpperCase(), PAD*S, (y+DAY_LBL_H/2)*S);
      const lw = ctx.measureText(g.label.toUpperCase()).width/S + 8;
      line(PAD+lw, y+DAY_LBL_H/2, W-PAD, y+DAY_LBL_H/2, C.border);
      y += DAY_LBL_H;

      g.items.forEach((p, pi) => {
        const my = y + MATCH_H/2;
        const usableW    = INNER - META_W - 6;
        const COL_W      = usableW / 3;
        const metaX      = PAD + META_W/2;
        const contentX   = PAD + META_W + 6;
        const leftEnd    = contentX + COL_W;
        const rightStart = contentX + COL_W*2;
        const centerX    = contentX + COL_W + COL_W/2;

        if (pi > 0) { ctx.fillStyle = C.sep; ctx.fillRect(PAD*S, y*S, INNER*S, 1*S); }

        // hora
        txt(p.hora,        metaX,        my-8,  fm(9),  C.muted, 'center');
        // grupo badge
        badgeFn('G.'+p.grupo, metaX,     my+8,  C.green, C.greenD);

        txt((FLAGS[p.local]||'') + ' ' + p.local,       leftEnd-4,    my,   fb(13), C.text,  'right', COL_W-8);
        scoreBox(p.score.gl, centerX-21, my);
        txt(':',           centerX,      my,   fb(16), C.muted, 'center');
        scoreBox(p.score.gv, centerX+21, my);
        txt(p.visitante + ' ' + (FLAGS[p.visitante]||''),   rightStart+4, my,   fb(13), C.text,  'left',  COL_W-8);

        y += MATCH_H;
      });
      y += SECTION_GAP;
    });

    line(PAD, y, W-PAD, y, C.border);
    y += 10;
    txt('Mundial 2026 · Fecha 3', PAD, y+10, fn(10), C.muted);
    txt(new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}), W-PAD, y+10, fn(10), C.muted, 'right');

    const safe = (nombre||'prode').replace(/[^a-zA-Z0-9_\-]/gi,'_');
    const link = document.createElement('a');
    link.download = 'prode_fecha3_' + safe + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('📥 Imagen guardada');
  } catch (err) {
    console.error(err);
    showToast('⚠ Error: ' + err.message, false);
  } finally {
    btn.disabled = false;
    btn.textContent = '📥 Guardar imagen';
  }
}
</script>
</body>
</html>
